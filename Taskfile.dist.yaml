version: '3'

vars:
  RUN: 'yarn' # yarn 4 via corepack — not npm, not pnpm

tasks:
  default:
    cmds:
      - task --list --sort=none
    silent: true

  install:
    desc: Install dependencies (enables corepack, runs yarn install)
    preconditions:
      - sh: command -v corepack
        msg: 'corepack not found — install Node.js 18+ (corepack ships with it)'
    cmds:
      - corepack enable
      - '{{.RUN}} install --immutable'

  dev:
    desc: Start Vite dev server
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} dev {{.CLI_ARGS}}'

  build:
    desc: Build static site for production
    deps: [_check_yarn]
    sources:
      - src/**/*
      - static/**/*
      - svelte.config.js
      - vite.config.ts
      - package.json
      - yarn.lock
    generates:
      - build/**/*
    cmds:
      - '{{.RUN}} build'

  preview:
    desc: Preview the production build locally
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} preview {{.CLI_ARGS}}'

  check:
    desc: Type-check with svelte-check (syncs SvelteKit first)
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} check'

  check:watch:
    desc: Type-check in watch mode
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} check:watch'

  fmt:
    desc: Format all files with Prettier
    aliases: [format]
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} format'

  fmt:check:
    desc: Check formatting without writing (CI-friendly)
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} format:check'

  lint:
    desc: Check formatting and run ESLint
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} lint'

  lint:fix:
    desc: Auto-fix ESLint problems
    deps: [_check_yarn]
    cmds:
      - '{{.RUN}} lint:fix'

  upgrade:
    desc: Interactively upgrade dependencies (Yarn)
    aliases: [up]
    deps: [_check_yarn]
    interactive: true
    cmds:
      - '{{.RUN}} upgrade-interactive'

  ci:
    desc: Full CI sequence (lint + check + build)
    cmds:
      - task: lint
      - task: check
      - task: build

  clean:
    desc: Remove build output and SvelteKit cache
    status:
      - test ! -d build
      - test ! -d .svelte-kit
    cmds:
      - rm -rf build .svelte-kit

  _check_yarn:
    internal: true
    preconditions:
      - sh: command -v yarn
        msg: 'yarn not found — install Node.js 18+ and run: corepack enable'
