<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0f17" />
    <meta name="color-scheme" content="dark" />

    <!-- Progressive enhancement: mark JS as available before first paint so
         scroll-reveal effects only apply with JS. No-JS clients (crawlers,
         archive.org) never get the class and see all content immediately. -->
    <script>
      document.documentElement.classList.add('js');
    </script>

    <title>glyphtrail - local code intelligence graph for AI coding agents</title>
    <meta
      name="description"
      content="Local code intelligence graph for AI coding agents: Tree-sitter static analysis, structural code search, dependency impact and blast-radius analysis over CLI and MCP server."
    />
    <meta
      name="keywords"
      content="code intelligence for AI coding agents, MCP server for code intelligence, Tree-sitter static analysis, code knowledge graph, structural code search, call graph and dependency graph, blast radius and impact analysis, local-first code intelligence, GraphRAG for codebases, repo index for Claude Code, Cursor, Windsurf, Codex"
    />
    <meta name="author" content="Markus Mayer" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://glyphtrail.dev/" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://glyphtrail.dev/" />
    <meta
      property="og:title"
      content="glyphtrail - local code intelligence graph for AI coding agents"
    />
    <meta
      property="og:description"
      content="Tree-sitter static analysis and structural code search for code knowledge graphs, call/dependency graphs, and blast-radius impact over CLI and MCP."
    />
    <meta property="og:site_name" content="glyphtrail" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://glyphtrail.dev/favicon.svg" />
    <meta property="og:image:alt" content="glyphtrail logo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="glyphtrail - local code intelligence graph for AI coding agents"
    />
    <meta
      name="twitter:description"
      content="Local-first code intelligence for AI coding agents with Tree-sitter analysis, structural code search, call/dependency graphs, and impact analysis."
    />
    <meta name="twitter:image" content="https://glyphtrail.dev/favicon.svg" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "glyphtrail",
        "description": "Local-first code intelligence graph for AI coding agents with Tree-sitter static analysis, structural code search, call graph traversal, dependency graph traversal, blast-radius analysis, CLI, and MCP support.",
        "url": "https://glyphtrail.dev/",
        "codeRepository": "https://github.com/glyphtrail/glyphtrail",
        "programmingLanguage": "Rust",
        "runtimePlatform": "CLI",
        "license": "https://github.com/glyphtrail/glyphtrail/blob/main/LICENSE",
        "author": {
          "@type": "Person",
          "name": "Markus Mayer",
          "url": "https://github.com/sunsided"
        },
        "targetProduct": {
          "@type": "SoftwareApplication",
          "name": "glyphtrail",
          "applicationCategory": "DeveloperApplication",
          "operatingSystem": "Linux, macOS, Windows"
        },
        "keywords": [
          "code intelligence",
          "code graph",
          "AI coding agents",
          "Tree-sitter",
          "static analysis",
          "structural code search",
          "call graph",
          "dependency graph",
          "blast radius analysis",
          "MCP"
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
